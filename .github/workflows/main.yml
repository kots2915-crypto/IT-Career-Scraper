name: Daily Data Scraper

on:
  schedule:
    - cron: '0 0 * * *' # Chạy tự động vào 00:00 mỗi ngày (giờ UTC)
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công bất cứ lúc nào

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install selenium pandas requests
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run Scraper
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python scraper.py
      - name: Commit and Push
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        git add data/*.csv
        
        if git diff --staged --quiet; then
          echo "Không có dữ liệu mới để cập nhật."
        else
          git commit -m "Auto update: New jobs found"
          git push
        fi
